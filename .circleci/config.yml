version: 2.1

jobs:

  build:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Build Frontend
          command: |
            cd frontend
            npm install
            npm run build

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys:
#          fingerprints:
#            - "YOUR_FINGERPRINT"
      - run:
          name: Deploy to EC2
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@3.111.170.98 "
              
              cd ~/fullstack-app || git clone https://github.com/anjali-ignitif/fullstack-app.git fullstack-app && cd fullstack-app

              git pull origin main

              # Backend
              cd backend
              python3 -m venv venv
              source venv/bin/activate
              pip install -r requirements.txt

              # Restart Flask
              pkill -f app.py || true
              cd flask-be
              nohup python app.py > app.log 2>&1 &

              # Frontend
              cd ../../frontend
              npm install
              npm run build

              # Restart Next.js
              pkill -f next || true
              nohup npm start > frontend.log 2>&1 &
            "

workflows:
  version: 2

  pipeline:
    jobs:
      - build:
          filters:
            branches:
              only:
                - develop
                - main

      - deploy:
          requires:
            - build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
