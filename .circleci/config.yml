version: 2.1

orbs:
  node: circleci/node@5.0.0
  python: circleci/python@2.0.0

jobs:

  build-frontend:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install & Build Frontend
          command: |
            cd frontend
            npm ci
            npm run build
      - persist_to_workspace:
          root: frontend
          paths:
            - build

  build-backend:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install Backend Dependencies
          command: |
            cd backend
            python -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
      - persist_to_workspace:
          root: backend
          paths:
            - .

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys:
          fingerprints:
            - "SHA256:qEZ/k6yLVxfbl8Lypzs33n7nI+3KukbXArQNhgDRSyg"

      - attach_workspace:
          at: .

      - run:
          name: Deploy to EC2 (Production Safe)
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST << 'EOF'

              set -e

              APP_DIR=~/fullstack-app
              FRONTEND_DIR=$APP_DIR/frontend
              BACKEND_DIR=$APP_DIR/backend

              # Ensure project directory exists
              mkdir -p $APP_DIR

              # -------- FRONTEND DEPLOY --------
              echo "Deploying frontend..."

              sudo mkdir -p /var/www/html

              # Clean and replace static files
              sudo rm -rf /var/www/html/*
              sudo cp -r $FRONTEND_DIR/build/* /var/www/html/

              # -------- BACKEND DEPLOY --------
              echo "Deploying backend..."

              cd $BACKEND_DIR

              # Create venv only if not exists
              if [ ! -d "venv" ]; then
                python3 -m venv venv
              fi

              source venv/bin/activate

              pip install --upgrade pip
              pip install -r requirements.txt

              # Restart backend safely using systemd
              sudo systemctl restart gunicorn

              # Reload nginx (no downtime)
              sudo systemctl reload nginx

              echo "Deployment completed successfully"

            EOF

workflows:
  version: 2

  production_pipeline:
    jobs:
      - build-frontend:
          filters:
            branches:
              only:
                - main

      - build-backend:
          filters:
            branches:
              only:
                - main

      - deploy:
          requires:
            - build-frontend
            - build-backend
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
