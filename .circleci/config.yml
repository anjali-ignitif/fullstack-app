version: 2.1

orbs:
  node: circleci/node@5.0.0
  python: circleci/python@2.0.0

jobs:

  build-frontend:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install & Build Frontend
          command: |
            cd frontend
            npm install
            npm run build
      - persist_to_workspace:
          root: .
          paths:
            - frontend/build

  build-backend:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install Backend
          command: |
            cd backend
            pip install -r requirements.txt
      - persist_to_workspace:
          root: .
          paths:
            - backend

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - add_ssh_keys:
          fingerprints:
            - "<your-key-fingerprint>"
      - run:
          name: Deploy to EC2
          command: |
            ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'EOF'
              cd /home/ubuntu/fullstack-app
              git pull origin main

              cd backend
              source venv/bin/activate
              pip install -r requirements.txt
              sudo systemctl restart gunicorn

              cd ../frontend
              npm install
              npm run build

              sudo systemctl restart nginx
            EOF

workflows:
  version: 2

  build_and_test:
    jobs:
      - build-frontend:
          filters:
            branches:
              only:
                - develop
                - main

      - build-backend:
          filters:
            branches:
              only:
                - develop
                - main

  deploy_on_tag:
    jobs:
      - deploy:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
